<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>生日提醒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: #e8f4ff;
      padding-bottom: 70px;
    }
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #ffffff;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      box-shadow: 0 -2px 10px rgba(0,80,180,0.15);
      z-index: 999;
    }
    .nav button {
      background: none;
      border: none;
      font-size: 14px;
      color: #557cad;
      padding: 8px 12px;
      border-radius: 20px;
    }
    .nav button.active {
      background: #237bdd;
      color: white;
    }
    .page {
      display: none;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    .page.show {
      display: block;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(35,123,221,0.12);
    }
    .card h3 {
      color: #237bdd;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .calendar-head{
      display:grid;
      grid-template-columns: repeat(7,1fr);
      text-align:center;
      padding:6px 0;
      font-size:13px;
      color:#237bdd;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      text-align: center;
    }
    .calendar .day {
      padding: 8px 5px;
      border-radius: 6px;
      font-size: 13px;
      min-height:34px;
      background:#f2f8ff;
    }
    .calendar .today {
      background: #237bdd;
      color: white;
    }
    .calendar .has-birth {
      background: #ff5555;
      color: white;
    }
    .birth-item {
      padding: 10px;
      border-bottom: 1px solid #e1edfa;
      display: flex;
      justify-content: space-between;
    }
    .birth-item:last-child {
      border-bottom: none;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #c9e0f8;
      border-radius: 8px;
      font-size: 14px;
      background:#f8fbff;
    }
    .btn-submit {
      width:100%;
      padding:12px;
      margin:8px 0;
      background: #237bdd;
      color: white;
      border: none;
      border-radius:8px;
      font-weight: bold;
    }
    .search-box {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>
  <div class="page show" id="page1">
    <div class="card">
      <h3>📅 当月日历 <span id="cal-month"></span></h3>
      <div class="calendar-head">
        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
      </div>
      <div id="calendar-view" class="calendar"></div>
    </div>
    <div class="card">
      <h3>🎂 近期生日</h3>
      <div id="near-birth"></div>
    </div>
  </div>

  <div class="page" id="page2">
    <div class="search-box">
      <input type="text" id="search" placeholder="搜索好友姓名" />
    </div>
    <div class="card">
      <h3>👥 好友列表</h3>
      <div id="friend-list"></div>
    </div>
  </div>

  <div class="page" id="page3">
    <div class="card">
      <h3>➕ 添加生日</h3>
      <input type="text" id="name" placeholder="请输入姓名" />
      <input type="date" id="birth-date" />
      <select id="type">
        <option value="gregorian">公历</option>
        <option value="lunar">农历</option>
      </select>
      <button class="btn-submit" onclick="saveBirth()">保存</button>
    </div>
  </div>

  <div class="page" id="page4">
    <div class="card">
      <h3>⚙️ 默认生日格式设置</h3>
      <select id="default-type">
        <option value="gregorian">公历</option>
        <option value="lunar">农历</option>
      </select>
      <button class="btn-submit" onclick="saveSetting()">保存默认设置</button>
      <div style="margin-top:10px;color:#666;font-size:13px;">设置后新增生日默认选中该项</div>
    </div>
  </div>

  <div class="nav">
    <button onclick="switchPage(1)" class="active">首页</button>
    <button onclick="switchPage(2)">好友</button>
    <button onclick="switchPage(3)">添加</button>
    <button onclick="switchPage(4)">设置</button>
  </div>

<script>
const STORAGE_KEY = 'birthday_list'
const SETTING_KEY = 'birthday_setting'

function switchPage(num){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'))
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'))
  document.getElementById(`page${num}`).classList.add('show')
  event.target.classList.add('active')
}

function getList(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')
}

function saveBirth(){
  let name=document.getElementById('name').value.trim()
  let bd=document.getElementById('birth-date').value
  let tp=document.getElementById('type').value
  if(!name||!bd){alert('姓名、生日不能为空');return;}
  let arr=getList()
  arr.push({name:name,date:bd,type:tp,uid:Date.now()})
  localStorage.setItem(STORAGE_KEY,JSON.stringify(arr))
  document.getElementById('name').value=''
  document.getElementById('birth-date').value=''
  refreshAll()
  alert('添加成功！')
}

function saveSetting(){
  let val=document.getElementById('default-type').value
  localStorage.setItem(SETTING_KEY,val)
  document.getElementById('type').value=val
  alert('默认配置已保存')
}

function renderCalendar(){
  let now=new Date()
  let y=now.getFullYear()
  let m=now.getMonth()
  let today=now.getDate()
  let firstWeekDay=new Date(y,m,1).getDay()
  let totalDays=new Date(y,m+1,0).getDate()
  let list=getList()
  let birthDayMap={}
  list.forEach(item=>{
    let d=new Date(item.date)
    let mk=`${d.getMonth()+1}-${d.getDate()}`
    birthDayMap[mk]=true
  })
  document.getElementById('cal-month').innerText=`${y}年${m+1}月`
  let html=''
  for(let i=0;i<firstWeekDay;i++) html+='<div class="day"></div>'
  for(let d=1;d<=totalDays;d++){
    let cls='day'
    if(d===today) cls+=' today'
    let markKey=`${m+1}-${d}`
    if(birthDayMap[markKey]) cls+=' has-birth'
    html+=`<div class="${cls}">${d}</div>`
  }
  document.getElementById('calendar-view').innerHTML=html
}

function renderNear(){
  let list=getList()
  let now=new Date()
  let cy=now.getFullYear()
  let res=list.map(item=>{
    let bd=new Date(item.date)
    let bm=bd.getMonth()
    let bday=bd.getDate()
    let nextBirth=new Date(cy,bm,bday)
    if(nextBirth<now) nextBirth=new Date(cy+1,bm,bday)
    let diff=Math.ceil((nextBirth-now)/(1000*60*60*24))
    return {...item,diff:diff}
  }).sort((a,b)=>a.diff-b.diff)
  let html=''
  res.slice(0,10).forEach(i=>{
    let t=i.type==='gregorian'?'公历':'农历'
    html+=`<div class="birth-item"><span>${i.name}</span><span>${i.date}(${t})｜${i.diff}天后</span></div>`
  })
  if(!html) html='<div style="padding:12px;text-align:center;color:#999">暂无保存生日</div>'
  document.getElementById('near-birth').innerHTML=html
}

function renderFriendList(key=''){
  let arr=getList().filter(x=>x.name.includes(key))
  let html=''
  arr.forEach(i=>{
    let t=i.type==='gregorian'?'公历':'农历'
    html+=`<div class="birth-item"><span>${i.name}</span><span>${i.date} ${t}</span></div>`
  })
  if(!html) html='<div style="padding:12px;text-align:center;color:#999">无匹配数据</div>'
  document.getElementById('friend-list').innerHTML=html
}

document.getElementById('search').addEventListener('input',e=>{
  renderFriendList(e.target.value.trim())
})

function refreshAll(){
  renderCalendar()
  renderNear()
  renderFriendList('')
}

window.onload=()=>{
  let def=localStorage.getItem(SETTING_KEY)||'gregorian'
  document.getElementById('default-type').value=def
  document.getElementById('type').value=def
  refreshAll()
}
</script>
</body>
</html>
